<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="ng1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ng2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="ng3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="220" fill="#0d1117"/>
  <g transform="translate(450,110)" filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite"/>
      <ellipse rx="90" ry="28" fill="none" stroke="url(#ng1)" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.5"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="32s" repeatCount="indefinite"/>
      <ellipse rx="90" ry="28" fill="none" stroke="url(#ng2)" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.4" transform="rotate(60)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="240" to="600" dur="40s" repeatCount="indefinite"/>
      <ellipse rx="90" ry="28" fill="none" stroke="url(#ng3)" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.35" transform="rotate(-60)"/>
    </g>
    <circle r="5" fill="#00d4ff" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="450" y="105" text-anchor="middle" dominant-baseline="central" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1.5">NATHLAN</text>
  <text x="450" y="140" text-anchor="middle" dominant-baseline="central" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500" fill="#8b949e" letter-spacing="6">SOLUTIONS</text>
</svg>
