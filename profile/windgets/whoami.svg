<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280">
  <defs>
    <linearGradient id="gCreative" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/><stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="gEngineering" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="gResearch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="gVentures" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    
    <filter id="glowCreative" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowEngineering" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowResearch" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowVentures" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .col-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .col-item { font-size: 12.5px; font-weight: 500; fill: #94A3B8; }
    .divider { stroke: #1E293B; stroke-width: 1; stroke-dasharray: 4 4; }
  </style>

  <rect width="820" height="280" fill="transparent"/>

  <!-- Vertical subtle dividers (Figma/Webflow style grid lines) -->
  <line x1="205" y1="20" x2="205" y2="260" class="divider"/>
  <line x1="410" y1="20" x2="410" y2="260" class="divider"/>
  <line x1="615" y1="20" x2="615" y2="260" class="divider"/>

  <!-- CREATIVE COLUMN -->
  <g transform="translate(102, 50)">
    <!-- Magic Wand / Pen Icon -->
    <g filter="url(#glowCreative)">
      <path d="M12 -8 L16 -16 L24 -12 L16 -4 Z M-12 16 L12 -8 L16 -4 L-8 20 Z" fill="url(#gCreative)" opacity="0.9"/>
      <circle cx="-16" cy="24" r="3" fill="url(#gCreative)"/>
    </g>
    <text x="0" y="45" text-anchor="middle" class="col-title" fill="#F97316">CREATIVE</text>
    <text x="0" y="80" text-anchor="middle" class="col-item">Game &amp; Interactive</text>
    <text x="0" y="110" text-anchor="middle" class="col-item">Audio &amp; Visual Design</text>
    <text x="0" y="140" text-anchor="middle" class="col-item">Creative Engines</text>
    <text x="0" y="170" text-anchor="middle" class="col-item">Player Experiences</text>
  </g>

  <!-- ENGINEERING COLUMN -->
  <g transform="translate(307, 50)">
    <!-- Layers / Code Box Icon -->
    <g filter="url(#glowEngineering)">
      <path d="M-18 -2 L0 -10 L18 -2 L0 6 Z" fill="none" stroke="url(#gEngineering)" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-18 6 L0 14 L18 6" fill="none" stroke="url(#gEngineering)" stroke-width="2.5" stroke-linejoin="round" opacity="0.6"/>
      <path d="M-18 14 L0 22 L18 14" fill="none" stroke="url(#gEngineering)" stroke-width="2.5" stroke-linejoin="round" opacity="0.3"/>
    </g>
    <text x="0" y="45" text-anchor="middle" class="col-title" fill="#00D4FF">ENGINEERING</text>
    <text x="0" y="80" text-anchor="middle" class="col-item">Full-Stack Systems</text>
    <text x="0" y="110" text-anchor="middle" class="col-item">AI &amp; Neural Engines</text>
    <text x="0" y="140" text-anchor="middle" class="col-item">Open Source</text>
    <text x="0" y="170" text-anchor="middle" class="col-item">Developer Tooling</text>
  </g>

  <!-- RESEARCH COLUMN -->
  <g transform="translate(512, 50)">
    <!-- Neural Node / Atom Icon -->
    <g filter="url(#glowResearch)">
      <circle cx="0" cy="4" r="6" fill="none" stroke="url(#gResearch)" stroke-width="2.5"/>
      <circle cx="-14" cy="-8" r="3" fill="url(#gResearch)"/>
      <circle cx="14" cy="-8" r="3" fill="url(#gResearch)"/>
      <circle cx="0" cy="20" r="3" fill="url(#gResearch)"/>
      <path d="M-11 -5 L-3 1 M11 -5 L3 1 M0 10 L0 17" stroke="url(#gResearch)" stroke-width="2" opacity="0.6"/>
    </g>
    <text x="0" y="45" text-anchor="middle" class="col-title" fill="#A855F7">RESEARCH</text>
    <text x="0" y="80" text-anchor="middle" class="col-item">Audio AI &amp; Music</text>
    <text x="0" y="110" text-anchor="middle" class="col-item">Language Design</text>
    <text x="0" y="140" text-anchor="middle" class="col-item">Knowledge Systems</text>
    <text x="0" y="170" text-anchor="middle" class="col-item">Autonomous Pipelines</text>
  </g>

  <!-- VENTURES COLUMN -->
  <g transform="translate(717, 50)">
    <!-- Chart / Compass Icon -->
    <g filter="url(#glowVentures)">
      <path d="M-12 12 L-4 -4 L4 4 L14 -10" fill="none" stroke="url(#gVentures)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 -10 L14 -10 L14 -2" fill="none" stroke="url(#gVentures)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="14" cy="-10" r="2" fill="#FBBF24"/>
    </g>
    <text x="0" y="45" text-anchor="middle" class="col-title" fill="#FBBF24">VENTURES</text>
    <text x="0" y="80" text-anchor="middle" class="col-item">Strategic Products</text>
    <text x="0" y="110" text-anchor="middle" class="col-item">Content Generation</text>
    <text x="0" y="140" text-anchor="middle" class="col-item">Brand Architecture</text>
    <text x="0" y="170" text-anchor="middle" class="col-item">Growth Systems</text>
  </g>
</svg>
