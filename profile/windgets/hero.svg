<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="aurora" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sharpGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&amp;display=swap');
    text { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .hero-title { font-size: 52px; font-weight: 800; letter-spacing: 16px; fill: url(#textGlow); }
    .hero-subtitle { font-size: 14px; font-weight: 600; letter-spacing: 8px; fill: #64748b; }
    .hero-micro { font-size: 10px; font-weight: 600; letter-spacing: 4px; fill: #475569; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    @keyframes pulseOrb {
      0%, 100% { r: 60px; opacity: 0.15; }
      50% { r: 75px; opacity: 0.25; }
    }
    .orb1 { animation: pulseOrb 8s ease-in-out infinite; transform-origin: center; }
    .orb2 { animation: pulseOrb 6s ease-in-out infinite reverse; transform-origin: center; }
  </style>

  <rect width="900" height="280" fill="transparent"/>

  <!-- Webflow/Apple style Abstract Aurora / Mesh Glowing Orbs in the background -->
  <g filter="url(#aurora)">
    <circle cx="350" cy="80" r="60" fill="url(#accent1)" class="orb1"/>
    <circle cx="550" cy="80" r="60" fill="url(#accent2)" class="orb2"/>
  </g>

  <!-- High-end Geometric Wireframe Centerpiece -->
  <g transform="translate(450, 75)" filter="url(#sharpGlow)">
    <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="none" stroke="url(#accent1)" stroke-width="1.5" opacity="0.6"/>
    <path d="M0 -15 L13 -7.5 L13 7.5 L0 15 L-13 7.5 L-13 -7.5 Z" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Ultra Premium Typography -->
  <text x="458" y="180" text-anchor="middle" class="hero-title">NATHLAN</text>
  <text x="450" y="220" text-anchor="middle" class="hero-subtitle">SOLUTIONS</text>
  
  <line x1="380" y1="245" x2="520" y2="245" stroke="#334155" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  
  <text x="450" y="265" text-anchor="middle" class="hero-micro">ENGINEERING · RESEARCH · VENTURES</text>
</svg>
