<svg xmlns="http://www.w3.org/2000/svg" width="820" height="100" viewBox="0 0 820 100">
  <defs>
    <linearGradient id="pillBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .status-text { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
    .status-sub { font-size: 10px; font-weight: 700; fill: #475569; letter-spacing: 3px; }
    .pill { stroke: url(#pillBorder); stroke-width: 1.5; fill: #0f172a; fill-opacity: 0.4; }
  </style>

  <rect width="820" height="100" fill="transparent"/>

  <g transform="translate(108, 15)">
    <rect x="0" y="0" width="180" height="40" rx="20" class="pill" filter="url(#softGlow)"/>
    <text x="90" y="25" text-anchor="middle" class="status-text" fill="#E2E8F0">&#x1F4CD; Brazil &#x1F1E7;&#x1F1F7;</text>
  </g>

  <g transform="translate(318, 15)">
    <rect x="0" y="0" width="180" height="40" rx="20" class="pill" filter="url(#softGlow)"/>
    <circle cx="25" cy="20" r="4" fill="#00D4FF">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="25" text-anchor="middle" class="status-text" fill="#00D4FF">Building the Future</text>
  </g>

  <g transform="translate(528, 15)">
    <rect x="0" y="0" width="180" height="40" rx="20" class="pill" filter="url(#softGlow)"/>
    <path d="M30 14 L24 22 L28 22 L26 28 L32 20 L28 20 Z" fill="#FBBF24"/>
    <text x="105" y="25" text-anchor="middle" class="status-text" fill="#FBBF24">DevStack Division</text>
  </g>

  <text x="410" y="85" text-anchor="middle" class="status-sub">ORGANIZATION · RESEARCH · ENGINEERING · VENTURES</text>
</svg>
