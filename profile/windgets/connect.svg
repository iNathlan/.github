<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="820" height="240" viewBox="0 0 820 240">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .sec-title { font-size: 11px; font-weight: 800; letter-spacing: 4px; fill: #64748B; }
    .btn-text { font-size: 13px; font-weight: 700; }
    .btn-sub { font-size: 10px; font-weight: 600; fill: #94A3B8; }
    .btn-glass { stroke: #334155; stroke-width: 1; fill: #0f172a; fill-opacity: 0.6; }
  </style>

  <rect width="820" height="240" fill="transparent"/>

  <text x="410" y="30" text-anchor="middle" class="sec-title">DEVELOPMENT</text>
  
  <g transform="translate(160, 50)">
    <a xlink:href="https://github.com/iNathlan" target="_blank">
      <rect x="0" y="0" width="220" height="50" rx="12" class="btn-glass"/>
      <circle cx="25" cy="25" r="4" fill="#E2E8F0"/>
      <text x="45" y="24" class="btn-text" fill="#F8FAFC">GitHub Org</text>
      <text x="45" y="38" class="btn-sub">@iNathlan</text>
    </a>
  </g>

  <g transform="translate(440, 50)">
    <a xlink:href="https://gitlab.com/wenathlan" target="_blank">
      <rect x="0" y="0" width="220" height="50" rx="12" class="btn-glass"/>
      <circle cx="25" cy="25" r="4" fill="#FC6D26"/>
      <text x="45" y="24" class="btn-text" fill="#F8FAFC">GitLab</text>
      <text x="45" y="38" class="btn-sub">@wenathlan</text>
    </a>
  </g>

  <text x="410" y="140" text-anchor="middle" class="sec-title">SOCIAL &amp; CONNECT</text>

  <g transform="translate(100, 160)">
    <a xlink:href="https://x.com/wenathlan" target="_blank">
      <rect x="0" y="0" width="180" height="50" rx="12" class="btn-glass"/>
      <circle cx="25" cy="25" r="4" fill="#ffffff"/>
      <text x="45" y="30" class="btn-text" fill="#F8FAFC">X (Twitter)</text>
    </a>
  </g>

  <g transform="translate(320, 160)">
    <a xlink:href="https://youtube.com/@wenathlan" target="_blank">
      <rect x="0" y="0" width="180" height="50" rx="12" class="btn-glass"/>
      <circle cx="25" cy="25" r="4" fill="#EF4444"/>
      <text x="45" y="30" class="btn-text" fill="#F8FAFC">YouTube</text>
    </a>
  </g>

  <g transform="translate(540, 160)">
    <a xlink:href="https://bsky.app/profile/wenathlan" target="_blank">
      <rect x="0" y="0" width="180" height="50" rx="12" class="btn-glass"/>
      <circle cx="25" cy="25" r="4" fill="#3B82F6"/>
      <text x="45" y="30" class="btn-text" fill="#F8FAFC">Bluesky</text>
    </a>
  </g>

</svg>
